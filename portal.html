<!doctype html><html lang="en"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0"><meta name="description" content="Patient portal for Moscow Smile Dental Clinic."><title>Patient Portal | Moscow Smile</title><link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet"><link rel="stylesheet" href="assets/css/styles.css"></head><body>
<nav class="navbar navbar-expand-lg bg-white sticky-top shadow-sm"><div class="container"><a class="navbar-brand" href="index.html">Moscow Smile</a></div></nav>
<main class="container py-5">
  <h1 class="section-title">Patient Portal</h1>
  <p>Register or login to track appointments and history.</p>
  <div id="guestView" class="row g-4">
    <div class="col-lg-6"><div class="card portal-card p-3"><h5>Register</h5><form id="registerForm"><input class="form-control mb-2" name="name" placeholder="Full name" required><input class="form-control mb-2" type="email" name="email" placeholder="Email" required><input class="form-control mb-3" type="password" name="password" placeholder="Password" required><button class="btn btn-primary">Create Account</button></form></div></div>
    <div class="col-lg-6"><div class="card portal-card p-3"><h5>Login</h5><form id="loginForm"><input class="form-control mb-2" type="email" name="email" placeholder="Email" required><input class="form-control mb-3" type="password" name="password" placeholder="Password" required><button class="btn btn-primary">Sign In</button></form></div></div>
  </div>
  <div id="loggedView" class="d-none">
    <div class="card portal-card p-3">
      <h5>Welcome, <span id="patientName"></span></h5>
      <p>Your upcoming appointments:</p>
      <ul id="apptList" class="list-group mb-3"></ul>
      <button id="logoutBtn" class="btn btn-outline-secondary">Logout</button>
    </div>
  </div>
</main><script src="assets/js/portal.js"></script></body></html>
