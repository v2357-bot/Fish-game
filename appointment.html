<!doctype html><html lang="en"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0"><meta name="description" content="Book appointment at Moscow Smile Dental Clinic."><title>Appointment Booking | Moscow Smile</title><link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet"><link rel="stylesheet" href="assets/css/styles.css"></head><body>
<nav class="navbar navbar-expand-lg bg-white sticky-top shadow-sm"><div class="container"><a class="navbar-brand" href="index.html">Moscow Smile</a></div></nav>
<main class="container py-5">
  <h1 class="section-title mb-4">Appointment Booking</h1>
  <div class="row g-4">
    <div class="col-lg-7">
      <form id="appointmentForm" class="card p-3" aria-label="Appointment form">
        <div class="row g-2"><div class="col-md-6"><label class="form-label">Full Name</label><input name="name" required class="form-control"></div><div class="col-md-6"><label class="form-label">Email</label><input type="email" name="email" required class="form-control"></div></div>
        <div class="row g-2 mt-1"><div class="col-md-6"><label class="form-label">Preferred Date</label><input type="date" name="date" required class="form-control"></div><div class="col-md-6"><label class="form-label">Preferred Time</label><input type="time" name="time" required class="form-control"></div></div>
        <label class="form-label mt-2">Service</label>
        <select name="service" class="form-select mb-3"><option>Whitening</option><option>Implants</option><option>Orthodontics</option><option>Pediatric</option></select>
        <button class="btn btn-primary">Submit Booking</button>
      </form>
      <div id="appointmentMsg" class="alert alert-success mt-3 d-none" role="status"></div>
    </div>
    <div class="col-lg-5">
      <div class="card p-3"><h5>Calendar Integration Placeholder</h5><p>Embed Calendly, Google Calendar booking, or CRM scheduler in production.</p><div class="ratio ratio-4x3 bg-light border rounded d-flex align-items-center justify-content-center">Calendly Widget Placeholder</div></div>
    </div>
  </div>
</main><script src="assets/js/appointment.js"></script></body></html>
